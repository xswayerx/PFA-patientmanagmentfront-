<div class="login-shell">
  <div class="container app-container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="text-center mb-4">
          <div class="metric-icon" style="margin-inline: auto; width: 56px; height: 56px; border-radius: 18px;">
            <i class="fas fa-heartbeat"></i>
          </div>
          <h1 class="mt-3 mb-1" style="font-weight: 900; letter-spacing: -0.03em;">Sign in</h1>
          <div class="text-muted">Access your medical dashboard securely</div>
        </div>

        <div class="card app-card">
          <div class="card-body p-4 p-md-4">
            <p class="text-muted mb-4">
              Sign in via Keycloak. MFA (OTP/WebAuthn) is enforced by your organization.
            </p>

            <button class="btn btn-primary w-100" type="button" (click)="login()" style="padding: .7rem 1rem; font-weight: 800;">
              Sign in with Keycloak
            </button>

            <div class="text-center mt-3" *ngIf="authService.isAuthenticated">
              <a class="link-primary" routerLink="/dashboard">Continue to dashboard</a>
            </div>
          </div>
        </div>

        <div class="text-center text-muted small mt-4">
          © 2026 Patient Appointment System
        </div>
      </div>
    </div>
  </div>
</div>
